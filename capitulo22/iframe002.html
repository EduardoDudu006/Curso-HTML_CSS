<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de Iframe</title>
    <style>
        /* A configuração da Folha de Estilos é Absoluta em relação a estilizações locais no body. */
        iframe {
            width: 400px;
            height: 400px;
        }
    </style>
</head>

<body>
    <button class="voltar">
            <p><a href="/capitulo22/iframe001.html" rel="prev"> <img width="15" height="15" src="https://img.icons8.com/dotty/80/back.png" alt="back"/> Voltar.</a></p>
    </button>
    <h1>Testando o uso de um iframe</h1>
    <p>
        Acessando o site do
        <!-- iframe significa - Quadro em inline (em linha)

        Tamanho Padrão do iframe:

        width: 300px;
        height: 150;

        Parâmetro framborder="" acita apenas dois valores, 0 e 1, onde zero retira a borda e um deixa a borda aparente.

        Existe um parâmetro chamado (scolling="") que serva para desativar a rolagem do iframe, porém, não funciona em todos os navgadores.
        -->
        <iframe src="https://www.cursoemvideo.com" frameborder="0" scolling="no">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em Vídeo</a>
        </iframe>

        para aprender a programar.
    </p>
    <p>
        O site do
        <iframe src="https://www.google.com.br" frameborder="0">
            <a href="https://www.google.com.br" target="_blank">Google</a>
        </iframe>
        também é muito legal, pena que não funciona dentro do igrame!
    </p>

    <p>
        O repositório do Guanabara
        <iframe src="https://gustavoguanabara.github.io" frameborder="0">
            <a href="https://gustavoguanabara.github.io" target="_blank">GitHub</a>
        </iframe>
        também é bem legal!
    </p>
</body>
</html>
