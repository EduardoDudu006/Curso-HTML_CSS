<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        .container {
            background-color: lightsalmon;
            display: flex;
        }

        .item {
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }

        .container02 {
            background-color: lightcoral;
            display: flex;
            flex-direction: row-reverse;
        }

        .item02 {
            background-color: lightseagreen;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }

        .container03 {
            background-color: lightyellow;
            display: flex;
            flex-direction: column;
        }

        .item03 {
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }

         .container04 {
            background-color: lightpink;
            display: flex;
            flex-direction: column-reverse;
        }

        .item04 {
            background-color: lightgreen;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }

        h1, h2 {
            text-align: center;
        }
    </style>
</head>
<body>
   <button class="voltar">
            <p><a href="/capitulo27/flex001/index.html" rel="prev"> <img width="15" height="15" src="https://img.icons8.com/dotty/80/back.png" alt="back"/> Voltar.</a></p>
    </button>

    <h1>Aula 02: Direções e Eixos Flexbox CSS</h1>

    <h2>Flex-direction: row;</h2>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
    </div>

    <h2>Flex-direction: row-reverse;</h2>
    <div class="container02">
        <div class="item02">A</div>
        <div class="item02">B</div>
        <div class="item02">C</div>
        <div class="item02">D</div>
        <div class="item02">E</div>
        <div class="item02">F</div>
        <div class="item02">G</div>
    </div>

    <h2>Flex-direction: column;</h2>
    <div class="container03">
        <div class="item03">A</div>
        <div class="item03">B</div>
        <div class="item03">C</div>
        <div class="item03">D</div>
        <div class="item03">E</div>
        <div class="item03">F</div>
        <div class="item03">G</div>
    </div>

    <h2>Flex-direction: column-reverse;</h2>
    <div class="container04">
        <div class="item04">A</div>
        <div class="item04">B</div>
        <div class="item04">C</div>
        <div class="item04">D</div>
        <div class="item04">E</div>
        <div class="item04">F</div>
        <div class="item04">G</div>
    </div>

</body>
</html>
