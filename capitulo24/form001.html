<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <button class="voltar">
            <p><a href="/index.html" rel="prev"> <img width="15" height="15" src="https://img.icons8.com/dotty/80/back.png" alt="back"/> Voltar para a primeira página.</a></p>
    </button>

    <!--
    Em HTML existem dois métodos simples para envio de formulários. GET e POST.
    Quando não determinamos nenhum método, automaticamente o HTML utilizará o método padrão que é method="get".
        Exemplo: <form action="cadastro.php" method="get" autocomplete="off">
        Esse método deixa exposto na URL os dados fornecidoa pelo usuário.
    Quando utilizamos o method+"post"
        Exemplo: <form action="cadastro.php" method="post" autocomplete="off">
        Os dados ficam ocultos da URL, porém, é possível capturar os dados
    -->
    <h1>Meu primeiro formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="off">
        <p>
            <!--
            É imprecindível usar label para criar relação entre o objeto(input) e a etiqueta (Nome:)
            -->
            <label for="inome">Nome:</label>
            <!--
            Para tags de entrada como <input> no HTML e PHP o (name="") é mais útil, já para o JavaScript o (id="") é mais importante
            -->
            <input type="text" name="nome" id="inome">
        </p>
        <p>
            <label for="isobrenome">Sobrenome:</label>
            <input type="text" name="sobrenome" id="isobrenome">
        </p>
        <p><input type="submit" value="Enviar"></p>
    </form>

        </li>
    </ul>

        </li>

</body>
