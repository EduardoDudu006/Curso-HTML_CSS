<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Formulário</title>
    <style>
        fieldset {
            width: 250px;
            border-radius: 20px;
        }

        legend {
            font-weight: bolder;
            font-size: 1.5em;
        }

        label {
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <button class="voltar">
            <p><a href="/capitulo24/form001.html" rel="prev"> <img width="15" height="15" src="https://img.icons8.com/dotty/80/back.png" alt="back"/> Voltar.</a></p>
    </button>
    <h1>Exemplo de Formulário</h1>
    <form action="" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados pessoais</legend>
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" required maxlength="20" placeholder="Nome completo" autocomplete="name" required>
            </p>
            <p>
                <label for="iemail">E-mail:</label>
                <input type="email" name="email" id="iemail" autocomplete="email" required>
            </p>
            <p>
                <label for="itel">Telefone:</label>
                <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^\(\d{2}\)\d[0-9]{4,5}-[0-9]{4}$" required placeholder="(xx)xxxxx-xxxx">
            </p>
        </fieldset>
        <!--
        Um tipo de Expressão Regular é:
        pattern="" - Entre aspas sempre começa com ^ e termina com $.
            Exemplo: pattern="^$"
            pattern="^\(\d{2}\)\d[0-9]{4,5}-[0-9]{4}$"
            Regula como deve ser Digitado: (81)99999-9999

        Estudar mais sobre RegEx = Expressões Regulares
        Pesquizar: HTML5 telefone pattern
         -->
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
