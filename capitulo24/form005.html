<head>

        fieldset {
            width: 250px;
            border-radius: 20px;

<body>
    <button class="voltar">

    <h1>Exemplo de Formulário</h1>
    <form action="" method="get" autocomplete="on">
        <fieldset>

            <input type="checkbox" name="esvol" id="iesvol"> Voleibol <br>
            <input type="checkbox" name="esnat" id="iesnat"> Natação
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
