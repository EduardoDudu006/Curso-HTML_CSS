<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formunário 05</title>
    <style>

        h1 {
            text-align: center;
        }
        fieldset {
            width: 250px;
            border-radius: 15px;
            margin: auto;
        }

        legend {
            font-weight: bolder;
            font-size: 1.5em;
        }

        label {
            font-weight: bolder;
        }
        p {
            text-align: center;
        }
    </style>
</head>
<body>
    <button class="voltar">
            <p><a href="/capitulo24/form001.html" rel="prev"> <img width="15" height="15" src="https://img.icons8.com/dotty/80/back.png" alt="back"/> Voltar.</a></p>
    </button>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="isxmas" value="M"> <label for="isxmas">Masculino</label> <br>
            <input type="radio" name="sexo" id="isxfem" value="F"> <label for="isxfem">Feminino</label>
            <!--Quando quizermos deixar uma opção já marcada, utilizaremos (checked) após o id="".-->
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esfut" id="iesfut"> <label for="iesfut">Futebol</label> <br>
            <input type="checkbox" name="esfutsat" id="ifutsal"> <label for="ifutsal">Futsal</label> <br>
            <input type="checkbox" name="esfutvol" id="iesfutvol"> <label for="iesfutvol">Futevôlei</label> <br>
            <input type="checkbox" name="esbasc" id="iesbasc"> <label for="iesbasc">Basquete</label> <br>
            <input type="checkbox" name="esten" id="iesten"> <label for="iesten">Tênis</label> <br>
            <input type="checkbox" name="esvol" id="iesvol"> <label for="iesvol">Voleibol</label> <br>
            <input type="checkbox" name="esnat" id="iesnat"> <label for="iesnat">Natação</label>
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
