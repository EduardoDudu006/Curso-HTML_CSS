<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 13</title>
     <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 300px;
        }

        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
        }

        .num{
            text-align: center;
        }

        .voltar{
            border-radius: 15px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <button class="voltar">
            <p><a href="/index.html" rel="prev"> <img width="15" height="15" src="https://img.icons8.com/dotty/80/back.png" alt="back"/> Voltar para a primeira página.</a></p>
    </button>
    <table>
         <tr> <!-- Primeira linha -->
            <td>1</td>
            <td>2</td>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>
        <tr class="linha"> <!-- Segunda linha -->
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>
        <tr> <!-- Terceira linha -->
            <td colspan="3">8</td>
            <td>9</td>
        </tr>
        <tr> <!-- Quarta linha -->
            <td rowspan="2">10</td>
            <td colspan="2">11</td>
             <td>12</td>
        </tr>
        <tr>
            <td>13</td>
            <td>14</td>
            <td>15</td>
        </tr>
    </table>
</body>
</html>
