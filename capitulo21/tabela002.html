<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 8px;
            text-align: center; /* Alinhamento Horizontal é por padrão (left) e pode ser também (center) e (right) */
            vertical-align: middle; /* Alinhamento Vertical é por padrão (middle = meio), mas, também pode ser (top = topo) ou (bottom = baixo)*/
        }

        .numero {
            text-align: right;
        }

        .voltar{
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <button class="voltar">
            <p><a href="/capitulo21/tabela001.html" rel="prev"> <img width="15" height="15" src="https://img.icons8.com/dotty/80/back.png" alt="back"/> Voltar.</a></p>
    </button>
    <h1>Minha Primeira Tabela</h1>
    <!--
    HIERARQUIA DE TABELAS (simples)
    TABLE = Tabela
        TABLE ROW = linha de tabela
            TABLE HEADER = cabeçalho de tabela
            TABLE DATA = dado de tabela

    Entender a Hierarquia dos elementos e Extremamente necessário para que seu código fique bem organizado.
-->
    <table>
        <tr> <!-- Primeira linha -->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr> <!-- Segunda linha -->
            <td>A2</td>
            <td>B2</td>
            <td class="numero">C2</td>
        </tr>
        <tr> <!-- Terceira linha -->
            <td>A3</td>
            <td>B3</td>
            <td class="numero">C3</td>
        </tr>
        <tr> <!-- Quarta linha -->
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>


        <!-- Obs.: O Consórcio W3C estabelece que o fechamento das Tags <tr> e <td> são facultativos, não sendo obrigatório o uso </tr> ou </td> -->
    </table>
</body>
</html>
